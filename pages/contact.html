<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Anime Haven</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
        <h1>Anime Haven</h1>
        <nav>
            <a href="../index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Contact Us</h2>
            <p>We would love to hear from you. Fill in the form below and we will get back to you as soon as possible.
            </p>

            <form id="contactForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
                    <span class="error-message" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address">
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="contactMethod">Preferred Contact Method</label>
                    <select id="contactMethod" name="contactMethod">
                        <option value="">Select an option</option>
                        <option value="email">Email</option>
                        <option value="phone">Phone</option>
                        <option value="none">No Preference</option>
                    </select>
                    <span class="error-message" id="methodError"></span>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Write your message here"></textarea>
                    <span class="error-message" id="messageError"></span>
                </div>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Anime Haven &copy; 2026</p>
    </footer>

    <script src="../js/validate.js"></script>
</body>

</html>
